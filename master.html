<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Hub | Gestão de Plataforma SaaS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #c9a050;
      --primary-dark: #a67c33;
      --bg-master: #080808;
      --card-bg: rgba(20, 20, 20, 0.8);
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      background: var(--bg-master);
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
    }

    /* Side Navigation */
    .sidebar-master {
      width: 260px;
      background: #000;
      border-right: 1px solid var(--border);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
    }

    .brand-master {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 50px;
      padding: 0 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), #fff);
      border-radius: 8px;
    }

    .brand-text {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .nav-master {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      padding: 12px 16px;
      border-radius: 10px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .nav-item.active {
      color: var(--primary);
    }

    /* Main Content */
    .content-master {
      flex: 1;
      margin-left: 260px;
      padding: 40px 60px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .welcome-msg h1 {
      margin: 0;
      font-size: 24px;
      color: #fff;
    }

    .welcome-msg p {
      margin: 5px 0 0;
      color: #666;
      font-size: 14px;
    }

    /* Cards */
    .stat-grid-master {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .card-stat {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .card-stat .label {
      color: #666;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .card-stat .value {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    /* Table/List Area */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .stores-table-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      padding: 20px;
      font-size: 12px;
      color: #555;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .store-name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .store-avatar {
      width: 36px;
      height: 36px;
      background: #1a1a1a;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--primary);
    }

    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-active { background: rgba(0, 255, 128, 0.1); color: #00ff80; }
    .badge-inactive { background: rgba(255, 50, 50, 0.1); color: #ff3232; }

    .action-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 8px;
      transition: color 0.2s;
    }

    .action-btn:hover { color: #fff; }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-overlay.show { display: flex; }

    .modal-card {
      background: #0f0f0f;
      border: 1px solid #222;
      border-radius: 28px;
      width: 100%;
      max-width: 500px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .btn-premium {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-premium:hover {
      background: #fff;
      transform: translateY(-2px);
    }

    .input-master {
      width: 100%;
      background: #000;
      border: 1px solid #222;
      color: #fff;
      padding: 14px;
      border-radius: 12px;
      margin-top: 8px;
      margin-bottom: 20px;
      box-sizing: border-box;
      font-size: 14px;
    }

    .input-master:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Notifications */
    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #fff;
      color: #000;
      padding: 16px 24px;
      border-radius: 12px;
      font-weight: 600;
      transform: translateY(100px);
      transition: transform 0.3s;
      z-index: 2000;
    }

    #toast.show { transform: translateY(0); }
  </style>
</head>
<body>
  
  <aside class="sidebar-master">
    <div class="brand-master">
      <div class="logo-icon"></div>
      <div class="brand-text">MASTER HUB</div>
    </div>
    <nav class="nav-master">
      <a href="#" class="nav-item active">🏢 Gerenciar Lojas</a>
      <a href="#" class="nav-item">📈 Estatísticas</a>
      <a href="#" class="nav-item">⚙️ Configurações</a>
      <a href="index.html" class="nav-item" style="margin-top:auto">🔙 Sair do Hub</a>
    </nav>
  </aside>

  <main class="content-master">
    <div class="top-bar">
      <div class="welcome-msg">
        <h1>Dashboard Master</h1>
        <p>Bem-vindo de volta, Administrador.</p>
      </div>
      <button class="btn-premium" onclick="openStoreModal()">+ Cadastrar Nova Loja</button>
    </div>

    <div class="stat-grid-master">
      <div class="card-stat">
        <div class="label">Total de Lojas</div>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="card-stat">
        <div class="label">Lojas Ativas</div>
        <div class="value" id="stat-active" style="color:#00ff80">0</div>
      </div>
      <div class="card-stat">
        <div class="label">Produtos Totais</div>
        <div class="value" id="stat-products">0</div>
      </div>
      <div class="card-stat">
        <div class="label">Status Sistema</div>
        <div class="value" style="font-size:14px">Operacional 🟢</div>
      </div>
    </div>

    <div class="section-header">
      <h2 style="font-size: 20px; color: #fff;">Lojistas Cadastrados</h2>
    </div>

    <div class="stores-table-container">
      <table>
        <thead>
          <tr>
            <th>Loja</th>
            <th>Slug / URL</th>
            <th>WhatsApp</th>
            <th>E-mail de Acesso</th>
            <th>Status</th>
            <th style="text-align:right">Ações</th>
          </tr>
        </thead>
        <tbody id="master-store-list">
          <!-- Dinâmico -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- MODAL STORE -->
  <div class="modal-overlay" id="store-modal">
    <div class="modal-card">
      <h2 id="modal-title" style="margin-bottom: 30px; font-size: 24px;">Nova Loja</h2>
      <div id="store-form">
        <label>Nome Comercial</label>
        <input type="text" id="m-name" class="input-master" placeholder="Ex: Apple Premium Store">
        
        <label>Identificador (Slug para URL)</label>
        <input type="text" id="m-slug" class="input-master" placeholder="ex: apple-premium">
        
        <label>WhatsApp (com DDD)</label>
        <input type="text" id="m-whatsapp" class="input-master" placeholder="5511999999999">

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label>E-mail de Login</label>
            <input type="email" id="m-email" class="input-master" placeholder="cliente@email.com">
          </div>
          <div>
            <label>Senha de Acesso</label>
            <input type="text" id="m-pass" class="input-master" value="123456">
          </div>
        </div>

        <div style="display:flex; gap: 12px; margin-top: 10px;">
          <button class="btn-premium" style="background:#222; color:#fff; flex:1" onclick="closeStoreModal()">Cancelar</button>
          <button class="btn-premium" style="flex:1" onclick="handleStoreSubmit()">Salvar Loja</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="supabase-config.js"></script>
  <script>
    let editingStoreId = null;

    async function loadDashboard() {
      const { data: stores, error } = await supabase.from('stores').select('*').order('created_at', { ascending: false });
      if (error) return showToast('Erro ao carregar dados ❌');

      // Stats
      document.getElementById('stat-total').textContent = stores.length;
      document.getElementById('stat-active').textContent = stores.filter(s => s.active).length;
      
      const { count: prodCount } = await supabase.from('products').select('*', { count: 'exact', head: true });
      document.getElementById('stat-products').textContent = prodCount || 0;

      // Table
      const list = document.getElementById('master-store-list');
      list.innerHTML = stores.map(s => `
        <tr>
          <td>
            <div class="store-name-cell">
              <div class="store-avatar">${s.name.charAt(0)}</div>
              <div>
                <div style="font-weight:600; color:#fff">${s.name}</div>
                <div style="font-size:12px; color:#555">ID: ${s.id.split('-')[0]}</div>
              </div>
            </div>
          </td>
          <td><code style="color:var(--primary)">?s=${s.slug}</code></td>
          <td>${s.whatsapp || '---'}</td>
          <td>${s.email}</td>
          <td><span class="badge ${s.active ? 'badge-active' : 'badge-inactive'}">${s.active ? 'Ativa' : 'Pausada'}</span></td>
          <td style="text-align:right">
            <button class="action-btn" onclick="openStoreModal('${s.id}')" title="Editar">✏️</button>
            <button class="action-btn" onclick="toggleStoreStatus('${s.id}', ${s.active})" title="${s.active ? 'Pausar' : 'Ativar'}">${s.active ? '⏸️' : '▶️'}</button>
            <button class="action-btn" onclick="deleteStore('${s.id}')" title="Excluir" style="color:#ff3232">🗑️</button>
          </td>
        </tr>
      `).join('');
    }

    async function handleStoreSubmit() {
      const data = {
        name: document.getElementById('m-name').value,
        slug: document.getElementById('m-slug').value,
        whatsapp: document.getElementById('m-whatsapp').value,
        email: document.getElementById('m-email').value,
        password: document.getElementById('m-pass').value
      };

      if (!data.name || !data.slug || !data.email) return showToast('Preencha os campos obrigatórios ⚠️');

      if (editingStoreId) {
        const { error } = await supabase.from('stores').update(data).eq('id', editingStoreId);
        if (error) return showToast('Erro ao atualizar: ' + error.message);
        showToast('Loja atualizada com sucesso! ✨');
      } else {
        const { error } = await supabase.from('stores').insert([data]);
        if (error) return showToast('Erro ao criar: ' + error.message);
        showToast('Nova loja cadastrada com sucesso! 🚀');
      }

      closeStoreModal();
      loadDashboard();
    }

    async function toggleStoreStatus(id, current) {
      const { error } = await supabase.from('stores').update({ active: !current }).eq('id', id);
      if (error) return showToast('Erro ao mudar status');
      loadDashboard();
      showToast('Status atualizado! 🔄');
    }

    async function deleteStore(id) {
      if (!confirm('ATENÇÃO: Isso apagará permanentemente a loja e todos os seus dados. Continuar?')) return;
      const { error } = await supabase.from('stores').delete().eq('id', id);
      if (error) return showToast('Erro ao excluir');
      loadDashboard();
      showToast('Loja removida 🗑️');
    }

    async function openStoreModal(id = null) {
      editingStoreId = id;
      document.getElementById('modal-title').textContent = id ? 'Editar Loja' : 'Cadastrar Nova Loja';
      
      if (id) {
        const { data } = await supabase.from('stores').select('*').eq('id', id).single();
        if (data) {
          document.getElementById('m-name').value = data.name;
          document.getElementById('m-slug').value = data.slug;
          document.getElementById('m-whatsapp').value = data.whatsapp || '';
          document.getElementById('m-email').value = data.email;
          document.getElementById('m-pass').value = data.password;
        }
      } else {
        ['m-name', 'm-slug', 'm-whatsapp', 'm-email'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('m-pass').value = '123456';
      }
      
      document.getElementById('store-modal').classList.add('show');
    }

    function closeStoreModal() {
      document.getElementById('store-modal').classList.remove('show');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadDashboard();
  </script>
</body>
</html>
